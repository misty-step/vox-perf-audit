name: Quality Checks

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: quality-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: quality
    timeout-minutes: 5
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"
      - name: Validate audit artifacts
        run: |
          python - <<'PY'
          import json
          from json import JSONDecodeError
          from pathlib import Path

          audit_root = Path("audit")
          paths = sorted(audit_root.rglob("*.json"))
          if not paths:
              raise SystemExit(
                  "expected committed audit artifacts under audit/; "
                  "see README.md for the repo contract"
              )

          for path in paths:
              try:
                  with path.open() as handle:
                      json.load(handle)
              except JSONDecodeError as exc:
                  raise SystemExit(f"{path}: invalid JSON ({exc})") from exc

          print(f"validated {len(paths)} audit artifacts")
          PY

  merge-gate:
    name: merge-gate
    timeout-minutes: 5
    # Always run so completed workflow runs publish one stable merge verdict.
    if: always()
    needs: [quality]
    runs-on: ubuntu-latest
    steps:
      - name: Enforce upstream success
        run: |
          case "${{ needs.quality.result }}" in
            success)
              ;;
            failure|cancelled|skipped)
              echo "quality job concluded with '${{ needs.quality.result }}'"
              exit 1
              ;;
            *)
              echo "unexpected quality result: '${{ needs.quality.result }}'"
              exit 1
              ;;
          esac
